{% extends "pages/base.html" %}

{% block title %}Contact | TalentScout{% endblock %}

{% block content %}
<h1>Contact Us</h1>
<p>Send us a message and we will get back to you.</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">
        <i class="fas fa-paper-plane"></i> Send Message
    </button>
</form>
{% endblock %}
